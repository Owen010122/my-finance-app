            0%, 100% { transform: rotate(-3deg); }

            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }

            60% { transform: translate(2px, 2px); }

let state = {
    transactions: [],
    currentType: 'expense',
    selectedCategory: null,
    lang: localStorage.getItem('bookkeeping_lang') || 'zh_hant',
    theme: localStorage.getItem('bookkeeping_theme') || 'male',
    detailMonth: new Date(),
    statsPeriod: 'month',
    statsType: 'expense'
};

function init() {
    loadData();
    applyTheme();
    applyLanguage();
    initYearSelector();
    showPage('home');
    document.getElementById('dateInput').valueAsDate = new Date();
    document.getElementById('statsMonthInput').value = formatDate(new Date(), 'yyyy-MM');
    document.getElementById('currentMonth').textContent = formatDate(new Date(), 'yyyy/MM');
    document.getElementById('langSelect').value = state.lang;
    document.getElementById('themeSelect').value = state.theme;
}

function loadData() {
    const data = localStorage.getItem('bookkeeping_data');
    if (data) state.transactions = JSON.parse(data);
}

function saveData() {
    localStorage.setItem('bookkeeping_data', JSON.stringify(state.transactions));
}

function initYearSelector() {
    const select = document.getElementById('statsYearInput');
    select.innerHTML = '';
    const currentYear = new Date().getFullYear();
    for (let y = currentYear - 5; y <= currentYear + 10; y++) {
        const option = document.createElement('option');
        option.value = y;
        option.textContent = y + (state.lang === 'en' ? '' : '年');
        if (y === currentYear) option.selected = true;
        select.appendChild(option);
    }
}

// ==================== THEME ====================
function applyTheme() {
    document.body.className = 'theme-' + state.theme;
    const scanline = document.getElementById('scanline');
    if (scanline) scanline.style.display = state.theme === 'male' ? 'block' : 'none';
    
    const icon1 = document.getElementById('headerIcon1');
    const icon2 = document.getElementById('headerIcon2');
    const themeIcon = document.getElementById('themeIcon');
    
    if (state.theme === 'male') {
        if (icon1) { icon1.className = 'fas fa-microchip mr-2 anime-float'; icon1.style.color = '#00ffff'; }
        if (icon2) { icon2.className = 'fas fa-bolt ml-2 anime-float'; icon2.style.color = '#00ffff'; icon2.style.animationDelay = '0.5s'; }
        if (themeIcon) { themeIcon.className = 'fas fa-moon text-green-500 text-lg'; }
        document.getElementById('pageTitle').style.fontFamily = "'Orbitron', 'Noto Sans TC', sans-serif";
    } else {
        if (icon1) { icon1.className = 'fas fa-star mr-2 anime-float'; icon1.style.color = '#ffd700'; }
        if (icon2) { icon2.className = 'fas fa-star ml-2 anime-float'; icon2.style.color = '#ffd700'; icon2.style.animationDelay = '0.5s'; }
        if (themeIcon) { themeIcon.className = 'fas fa-sun text-yellow-500 text-lg'; }
        document.getElementById('pageTitle').style.fontFamily = "'Noto Sans TC', 'Noto Sans SC', sans-serif";
    }
}

function changeTheme(theme) {
    state.theme = theme;
    localStorage.setItem('bookkeeping_theme', theme);
    applyTheme();
    refreshCurrentPage();
}

// ==================== LANGUAGE ====================
function applyLanguage() {
    const t = i18n[state.lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
    });
    
    const titles = { zh: '记账助手', zh_hant: '記帳助手', en: 'Bookkeeping' };
    document.getElementById('pageTitle').textContent = titles[state.lang];
    
    const yearSelect = document.getElementById('statsYearInput');
    if (yearSelect) {
        Array.from(yearSelect.options).forEach(opt => {
            const val = parseInt(opt.value);
            opt.textContent = val + (state.lang === 'en' ? '' : '年');
        });
    }
}

function changeLanguage(lang) {
    state.lang = lang;
    localStorage.setItem('bookkeeping_lang', lang);
    applyLanguage();
    refreshCurrentPage();
}

// ==================== NAVIGATION ====================
function showPage(page) {
    document.querySelectorAll('[id$="Page"]').forEach(el => el.classList.add('hidden'));
    document.getElementById(page + 'Page').classList.remove('hidden');
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        const isActive = btn.getAttribute('data-page') === page;
        btn.classList.toggle('active', isActive);
    });

    if (page === 'home') renderHome();
    if (page === 'add') renderAdd();
    if (page === 'detail') renderDetail();
    if (page === 'stats') renderStats();
}

function refreshCurrentPage() {
    const visible = document.querySelector('[id$="Page"]:not(.hidden)');
    if (visible) {
        const page = visible.id.replace('Page', '');
        if (page === 'home') renderHome();
        if (page === 'detail') renderDetail();
        if (page === 'stats') renderStats();
    }
}

// ==================== HOME PAGE ====================
function renderHome() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    // 更新當前月份顯示
    document.getElementById('currentMonth').textContent = formatDate(now, 'yyyy/MM');
    const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    
    const monthData = state.transactions.filter(t => {
        const d = new Date(t.date);
        return d >= monthStart && d <= monthEnd;
    });

    const income = monthData.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = monthData.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    
    document.getElementById('homeIncome').textContent = 'HK$' + income.toFixed(0);
    document.getElementById('homeExpense').textContent = 'HK$' + expense.toFixed(0);
    document.getElementById('homeBalance').textContent = 'HK$' + (income - expense).toFixed(0);
    
    // 計算並顯示總概覽數據
    const totalIncome = state.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const totalExpense = state.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    document.getElementById('homeTotalIncome').textContent = 'HK$' + totalIncome.toFixed(0);
    document.getElementById('homeTotalExpense').textContent = 'HK$' + totalExpense.toFixed(0);
    document.getElementById('homeTotalBalance').textContent = 'HK$' + (totalIncome - totalExpense).toFixed(0);
    const isMale = state.theme === 'male'; 
    const recent = [...state.transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
    const list = document.getElementById('recentList');
    list.innerHTML = recent.length ? '' : `<div class="text-center py-4 font-bold" style="color: ${isMale ? 'rgba(0,255,255,0.3)' : '#f9a8d4'};">${state.lang === 'en' ? 'No records' : '暫無記錄'}</div>`;
    
    recent.forEach(t => {
        const cat = getCategory(t.type, t.category);
        const tData = i18n[state.lang];
        const bgStyle = isMale ? 'background: rgba(30,41,59,0.5); border: 1px solid rgba(0,255,255,0.1);' : 'background: #fff0f5; border: 2px solid #fce7f3;';
        list.innerHTML += `
            <div class="flex items-center justify-between p-3 rounded-xl transition-colors" style="${bgStyle}">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-xl ${cat.color} border-2 flex items-center justify-center mr-3">
                        <i class="fas ${cat.icon}"></i>
                    </div>
                    <div>
                        <p class="font-bold text-gray-700">${tData[t.category] || t.category}</p>
                        <p class="text-xs font-bold" style="color: ${isMale ? 'rgba(0,255,255,0.5)' : '#f472b6'};">${t.date} ${t.note || ''}</p>
                    </div>
                </div>
                <span class="font-extrabold ${t.type === 'income' ? 'text-green-500' : 'text-red-500'} text-lg">
                    ${t.type === 'income' ? '+' : '-'}HK$${t.amount.toFixed(0)}
                </span>
            </div>
        `;
    });
}

// ==================== ADD PAGE ====================
function renderAdd() {
    const grid = document.getElementById('categoryGrid');
    const cats = categories[state.currentType];
    const t = i18n[state.lang];
    
    grid.innerHTML = cats.map((cat, idx) => `
        <button onclick="selectCategory('${cat.id}')" class="cat-btn flex flex-col items-center p-3 ${idx === 0 ? 'active' : ''}" data-cat="${cat.id}">
            <div class="w-10 h-10 rounded-xl ${cat.color} border-2 flex items-center justify-center mb-1">
                <i class="fas ${cat.icon}"></i>
            </div>
            <span class="text-xs font-bold">${t[cat.id] || cat.id}</span>
        </button>
    `).join('');
    
    state.selectedCategory = cats[0].id;
    
    const expenseBtn = document.getElementById('btnExpense');
    const incomeBtn = document.getElementById('btnIncome');
    
    if (state.currentType === 'expense') {
        expenseBtn.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all anime-btn-red';
        incomeBtn.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-gray-100 text-gray-400 border-transparent shadow-none';
    } else {
        expenseBtn.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-gray-100 text-gray-400 border-transparent shadow-none';
        incomeBtn.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all anime-btn-green';
    }
    
    const isMale = state.theme === 'male';
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.className = `w-full py-4 rounded-2xl text-white font-extrabold text-lg ${state.currentType === 'income' ? 'anime-btn-green' : (isMale ? 'anime-btn-cyan' : 'anime-btn-red')}`;
}

function setTransactionType(type) {
    state.currentType = type;
    renderAdd();
}

function selectCategory(catId) {
    state.selectedCategory = catId;
    document.querySelectorAll('.cat-btn').forEach(btn => {
        const isActive = btn.getAttribute('data-cat') === catId;
        btn.classList.toggle('active', isActive);
        if (!isActive) btn.classList.remove('active');
    });
}

function saveTransaction() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    if (!amount || amount <= 0) {
        showToast(state.lang === 'en' ? 'Please enter amount' : '請輸入金額');
        return;
    }
    
    const transaction = {
        id: Date.now(),
        type: state.currentType,
        amount: amount,
        category: state.selectedCategory,
        date: document.getElementById('dateInput').value,
        note: document.getElementById('noteInput').value,
        createdAt: new Date().toISOString()
    };
    
    state.transactions.push(transaction);
    saveData();
    
    document.getElementById('amountInput').value = '';
    document.getElementById('noteInput').value = '';
    document.getElementById('dateInput').valueAsDate = new Date();
    
    showToast(i18n[state.lang].saved);
    showPage('home');
}

// ==================== DETAIL PAGE ====================
let detailFilter = 'all';

function renderDetail() {
    const label = document.getElementById('detailMonthLabel');
    label.textContent = formatDate(state.detailMonth, 'yyyy/MM');
    
    const monthStart = new Date(state.detailMonth.getFullYear(), state.detailMonth.getMonth(), 1);
    const monthEnd = new Date(state.detailMonth.getFullYear(), state.detailMonth.getMonth() + 1, 0);
    
   

    let filtered = state.transactions.filter(t => {
        const d = new Date(t.date);
        return d >= monthStart && d <= monthEnd;
    });
    
    if (detailFilter !== 'all') {
        filtered = filtered.filter(t => t.type === detailFilter);
    }
    
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    const list = document.getElementById('detailList');
    const isMale = state.theme === 'male';
    if (!filtered.length) {
        list.innerHTML = `<div class="text-center py-8 font-bold text-lg" style="color: ${isMale ? 'rgba(0,255,255,0.3)' : '#f9a8d4'};">${state.lang === 'en' ? 'No records this month' : '本月暫無記錄'}</div>`;
        return;
    }
    
    const groups = {};
    filtered.forEach(t => {
        if (!groups[t.date]) groups[t.date] = [];
        groups[t.date].push(t);
    });
    
    const t = i18n[state.lang];
    list.innerHTML = Object.keys(groups).sort((a, b) => b.localeCompare(a)).map(date => {
        const cardBorder = isMale ? 'border-color: rgba(0,150,255,0.15);' : 'border-color: #bfdbfe;';
        const dateColor = isMale ? 'color: #00aaff;' : 'color: #2563eb;';
        const sumColor = isMale ? 'color: rgba(0,150,255,0.6);' : 'color: #60a5fa;';
        return `
        <div class="anime-card p-4 mb-3" style="${cardBorder}">
            <div class="flex justify-between items-center mb-2 pb-2 border-b-2" style="border-color: ${isMale ? 'rgba(0,150,255,0.1)' : '#dbeafe'};">
                <span class="font-extrabold" style="${dateColor}">${date}</span>
                <span class="text-sm font-bold" style="${sumColor}">
                    ${groups[date].reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0) > 0 ? '+' : ''}
                    HK$${groups[date].reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0).toFixed(0)}
                </span>
            </div>
            ${groups[date].map(t => {
                const cat = getCategory(t.type, t.category);
                return `
                <div class="flex items-center justify-between py-2">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-lg ${cat.color} border-2 flex items-center justify-center mr-3">
                            <i class="fas ${cat.icon} text-xs"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-gray-700">${t[t.category] || t.category}</p>
                            ${t.note ? `<p class="text-xs font-bold" style="color: ${isMale ? 'rgba(0,255,255,0.4)' : '#f9a8d4'};">${t.note}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center">
                        <span class="font-extrabold mr-3 ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">
                            ${t.type === 'income' ? '+' : '-'}HK$${t.amount.toFixed(0)}
                        </span>
                        <button onclick="deleteTransaction(${t.id})" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors" style="${isMale ? 'background: rgba(255,50,50,0.1); color: #ff4444;' : 'background: #fee2e2; color: #f87171;'}">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('')}
        </div>
    `}).join('');
}

function filterDetail(filter) {
    detailFilter = filter;
    document.querySelectorAll('.filter-pill').forEach(btn => {
        const isActive = btn.getAttribute('data-filter') === filter;
        btn.className = `filter-pill px-5 py-2 text-sm whitespace-nowrap ${isActive ? 'active' : ''}`;
    });
    renderDetail();
}

function changeDetailMonth(delta) {
    state.detailMonth.setMonth(state.detailMonth.getMonth() + delta);
    renderDetail();
}

function deleteTransaction(id) {
    state.transactions = state.transactions.filter(t => t.id !== id);
    saveData();
    renderDetail();
    showToast(i18n[state.lang].deleted);
}

// ==================== STATS PAGE ====================
function setStatsPeriod(period) {
    state.statsPeriod = period;
    const monthBtn = document.getElementById('statsMonthBtn');
    const yearBtn = document.getElementById('statsYearBtn');
    
    if (period === 'month') {
        monthBtn.className = 'flex-1 py-2 rounded-xl text-sm font-bold transition-all anime-btn-blue';
        yearBtn.className = 'flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-gray-100 text-gray-400 border-transparent shadow-none';
        document.getElementById('monthSelector').classList.remove('hidden');
        document.getElementById('yearSelector').classList.add('hidden');
    } else {
        monthBtn.className = 'flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-gray-100 text-gray-400 border-transparent shadow-none';
        yearBtn.className = 'flex-1 py-2 rounded-xl text-sm font-bold transition-all anime-btn-blue';
        document.getElementById('monthSelector').classList.add('hidden');
        document.getElementById('yearSelector').classList.remove('hidden');
    }
    renderStats();
}

function setStatsType(type) {
    state.statsType = type;
    const expenseBtn = document.getElementById('statsTypeExpense');
    const incomeBtn = document.getElementById('statsTypeIncome');
    
    if (type === 'expense') {
        expenseBtn.className = 'stats-type-btn flex-1 active-expense';
        incomeBtn.className = 'stats-type-btn flex-1 inactive';
    } else {
        expenseBtn.className = 'stats-type-btn flex-1 inactive';
        incomeBtn.className = 'stats-type-btn flex-1 active-income';
    }
    renderStats();
}

function renderStats() {
    // 控制趋势图卡片的显示：月度时隐藏
    const trendCard = document.getElementById('trendChartCard');
    if (trendCard) {
        if (state.statsPeriod === 'month') {
            trendCard.style.display = 'none';
            // 销毁已存在的趋势图实例，避免占用内存
            if (window.trendChartInstance) {
                window.trendChartInstance.destroy();
                window.trendChartInstance = null;
            }
        } else {
            trendCard.style.display = ''; // 恢复显示，默认样式
        }
    }
    
    let filtered;
    
    if (state.statsPeriod === 'month') {
        const monthVal = document.getElementById('statsMonthInput').value;
        if (!monthVal) return;
        const [year, month] = monthVal.split('-').map(Number);
        const start = new Date(year, month - 1, 1);
        const end = new Date(year, month, 0);
        filtered = state.transactions.filter(t => {
            const d = new Date(t.date);
            return d >= start && d <= end;
        });
    } else {
        const year = parseInt(document.getElementById('statsYearInput').value);
        const start = new Date(year, 0, 1);
        const end = new Date(year, 11, 31);
        filtered = state.transactions.filter(t => {
            const d = new Date(t.date);
            return d >= start && d <= end;
        });
    }
    
    const typeData = filtered.filter(t => t.type === state.statsType);
    const total = typeData.reduce((s, t) => s + t.amount, 0);
    
    document.getElementById('statsTotalLabel').textContent = state.statsType === 'expense' ? i18n[state.lang].totalExpense : i18n[state.lang].totalIncome;
    document.getElementById('statsTotal').textContent = 'HK$' + total.toFixed(0);
    document.getElementById('statsTotal').style.color = state.statsType === 'expense' ? '#ff4444' : '#00ff88';

    // Trend Chart
    const ctx1 = document.getElementById('trendChart').getContext('2d');
    if (window.trendChartInstance) window.trendChartInstance.destroy();
    
    let labels, data;
    const isMale = state.theme === 'male';
    
    if (state.statsPeriod === 'month') {
        const monthVal = document.getElementById('statsMonthInput').value;
        const daysInMonth = monthVal ? new Date(monthVal + '-01').getDate() : 30;
        labels = Array.from({length: daysInMonth}, (_, i) => (i + 1) + (state.lang === 'en' ? '' : '日'));
        data = labels.map((_, i) => {
            return typeData.filter(t => new Date(t.date).getDate() === i + 1).reduce((s, t) => s + t.amount, 0);
        });
    } else {
        labels = state.lang === 'en' ? 
            ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] :
            ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        data = labels.map((_, i) => {
            return typeData.filter(t => new Date(t.date).getMonth() === i).reduce((s, t) => s + t.amount, 0);
        });
    }
    
    const color = state.statsType === 'expense' ? (isMale ? '#ff4444' : '#ff69b4') : (isMale ? '#00ff88' : '#87ceeb');
    const bgColor = state.statsType === 'expense' ? (isMale ? 'rgba(255,68,68,0.2)' : 'rgba(255,105,180,0.2)') : (isMale ? 'rgba(0,255,136,0.2)' : 'rgba(135,206,235,0.2)');
    
    window.trendChartInstance = new Chart(ctx1, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: i18n[state.lang][state.statsType + 'Trend'],
                data: data,
                borderColor: color,
                backgroundColor: bgColor,
                fill: true,
                tension: 0.4,
                borderWidth: isMale ? 2 : 3,
                pointRadius: isMale ? 3 : 4,
                pointBackgroundColor: isMale ? '#0f172a' : '#fff',
                pointBorderWidth: 2,
                pointBorderColor: color
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
                y: { beginAtZero: true, grid: { color: isMale ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' }, ticks: { color: isMale ? '#64748b' : '#666' } }, 
                x: { grid: { display: false }, ticks: { color: isMale ? '#64748b' : '#666' } } 
            }
        }
    });

    // Category Chart
    const ctx2 = document.getElementById('categoryChart').getContext('2d');
    if (window.catChartInstance) window.catChartInstance.destroy();
    
    const catMap = {};
    typeData.forEach(t => {
        catMap[t.category] = (catMap[t.category] || 0) + t.amount;
    });
    
    const catLabels = Object.keys(catMap).map(k => i18n[state.lang][k] || k);
    const catData = Object.values(catMap);
    const colors = isMale ? 
        ['#00ffff', '#ff4444', '#00ff88', '#8888ff', '#ffcc00', '#ff8844', '#00aaff', '#ff66ff'] :
        ['#ff69b4', '#ffa07a', '#ffd700', '#98fb98', '#87ceeb', '#dda0dd', '#f0e68c', '#ffb6c1'];
    
    window.catChartInstance = new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: catLabels,
            datasets: [{ 
                data: catData, 
                backgroundColor: colors, 
                borderWidth: isMale ? 2 : 3, 
                borderColor: isMale ? '#0f172a' : '#fff' 
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { 
                    position: 'bottom', 
                    labels: { 
                        padding: 15, 
                        font: { size: 11 },
                        color: isMale ? '#94a3b8' : '#666'
                    } 
                } 
            },
            cutout: '60%'
        }
    });

    // Category Breakdown List
    const breakdown = document.getElementById('categoryBreakdown');
    const catTotal = catData.reduce((a, b) => a + b, 0);
    const sortedCats = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
    
    breakdown.innerHTML = sortedCats.map(([cat, amount], idx) => {
        const pct = catTotal ? (amount / catTotal * 100).toFixed(1) : 0;
        const catInfo = getCategory(state.statsType, cat);
        const barGradient = isMale ? 
            `linear-gradient(90deg, ${colors[idx % colors.length]}, ${colors[(idx + 1) % colors.length]})` :
            `linear-gradient(90deg, ${colors[idx % colors.length]}, ${colors[(idx + 1) % colors.length]})`;
        return `
            <div class="flex items-center justify-between p-2 rounded-xl" style="${isMale ? 'background: rgba(30,41,59,0.5); border: 1px solid rgba(100,100,255,0.1);' : 'background: #faf5ff; border: 2px solid #e9d5ff;'}">
                <div class="flex items-center flex-1">
                    <div class="w-10 h-10 rounded-xl ${catInfo.color} border-2 flex items-center justify-center mr-3">
                        <i class="fas ${catInfo.icon}"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-1">
                            <span class="text-sm font-bold text-gray-700">${i18n[state.lang][cat] || cat}</span>
                            <span class="text-sm font-extrabold" style="color: ${isMale ? '#8888ff' : '#9333ea'};">HK$${amount.toFixed(0)}</span>
                        </div>
                        <div class="w-full rounded-full h-3" style="background: ${isMale ? 'rgba(100,100,255,0.1)' : '#f3e8ff'}; border: ${isMale ? '1px solid rgba(100,100,255,0.2)' : '1px solid #e9d5ff'};">
                            <div class="h-full rounded-full transition-all duration-500" style="width: ${pct}%; background: ${barGradient}; box-shadow: ${isMale ? '0 0 10px ' + colors[idx % colors.length] : 'none'};"></div>
                        </div>
                    </div>
                </div>
                <span class="text-xs font-bold ml-3 w-12 text-right" style="color: ${isMale ? 'rgba(100,100,255,0.6)' : '#a855f7'};">${pct}%</span>
            </div>
        `;
    }).join('');
}

// ==================== SETTINGS ====================
function exportData() {
    const dataStr = JSON.stringify(state.transactions, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bookkeeping_${formatDate(new Date(), 'yyyyMMdd')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(i18n[state.lang].exported);
}

function confirmClear() {
    showModal(i18n[state.lang].clearAll, i18n[state.lang].clearConfirm, () => {
        state.transactions = [];
        saveData();
        showPage('home');
        showToast(i18n[state.lang].deleted);
    });
}

// ==================== UTILITIES ====================
function getCategory(type, id) {
    return categories[type].find(c => c.id === id) || categories[type][0];
}

function formatDate(date, fmt) {
    const y = date.getFullYear();
    const m = date.getMonth() + 1;
    const d = date.getDate();
    return fmt.replace('yyyy', y).replace('MM', m.toString().padStart(2, '0')).replace('dd', d.toString().padStart(2, '0'));
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.remove('opacity-0');
    toast.style.top = '100px';
    setTimeout(() => {
        toast.classList.add('opacity-0');
        toast.style.top = '80px';
    }, 2000);
}

function showModal(title, msg, onConfirm) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = msg;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalConfirm').onclick = () => {
        closeModal();
        onConfirm();
    };
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

// ==================== START ====================
init();
</script>
